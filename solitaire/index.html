<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- TV browsers default to a desktop-width viewport; pin to device width and lock zoom for the 10-foot UI. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05060f" />
  <title>Solitaire — Space Console</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- safe-area wrapper protects against TV overscan; see --safe-* in base.css -->
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <a href="../" aria-label="Back to games">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">Solitaire</span>
        </a>
      </div>
      <div class="topbar__hint" id="status" aria-live="polite">Tap a card to move it</div>
      <button class="mute" id="mute" type="button" aria-pressed="false" aria-label="Toggle sound" title="Toggle sound (M)">🔊</button>
    </header>

    <main class="stage">
      <section class="table" aria-label="Klondike Solitaire">
        <!-- Top row: stock + waste on the left, four foundations on the right. -->
        <div class="top-row">
          <div class="top-row__group">
            <div class="pile pile--stock" id="stock" aria-label="Stock"></div>
            <div class="pile pile--waste" id="waste" aria-label="Waste"></div>
          </div>
          <div class="top-row__group foundations" id="foundations" aria-label="Foundations"></div>
        </div>

        <!-- Seven downward-fanning tableau piles. -->
        <div class="tableau" id="tableau" aria-label="Tableau"></div>

        <!-- Win / start messaging. -->
        <div class="overlay overlay--hidden" id="overlay">
          <div class="overlay__card">
            <h1 class="overlay__title" id="overlayTitle">You win!</h1>
            <p class="overlay__msg" id="overlayMsg">All 52 cards home.</p>
          </div>
        </div>
      </section>
    </main>

    <!-- Always-visible primary controls (Draw / New Game; populated in app.js) -->
    <section class="controls" id="controls" aria-label="Controls"></section>

    <footer class="hintbar" id="hintbar">
      <span class="hint"><kbd class="key">←→</kbd> Move cursor</span>
      <span class="hint"><kbd class="key">↑↓</kbd> Pick card</span>
      <span class="hint"><kbd class="key">Enter</kbd> Select · Place</span>
      <span class="hint"><kbd class="key">D</kbd> Draw</span>
      <span class="hint"><kbd class="key">N</kbd> New game</span>
      <span class="hint"><kbd class="key">Back</kbd> Hub</span>
      <span class="hint"><kbd class="key">M</kbd> Mute</span>
    </footer>
  </div>

  <script type="module" src="./app.js?v=6d3a2e24-2deb-4c24-8209-124f5555ff77"></script>
</body>
</html>
