<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- TV browsers default to a desktop-width viewport; pin to device width and lock zoom for the 10-foot UI. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05060f" />
  <title>Snake — Space Console</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- safe-area wrapper protects against TV overscan; see --safe-* in base.css -->
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <a href="../" aria-label="Back to games">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">Snake</span>
        </a>
      </div>
      <div class="topbar__hint" id="status" aria-live="polite">Press Enter to start</div>
      <button class="mute" id="mute" type="button" aria-pressed="false" aria-label="Toggle sound" title="Toggle sound (M)">🔊</button>
    </header>

    <main class="stage">
      <!-- Playfield -->
      <section class="board" aria-label="Playfield">
        <canvas id="board" width="630" height="630"></canvas>
        <!-- Overlay for start / pause / game-over messaging -->
        <div class="overlay" id="overlay">
          <div class="overlay__card">
            <h1 class="overlay__title" id="overlayTitle">Snake</h1>
            <p class="overlay__msg" id="overlayMsg">Press <kbd>Enter</kbd> to start<br /><span class="touch-only">Swipe to turn · Tap to start</span></p>
          </div>
        </div>
      </section>

      <!-- Side panel: scoreboard -->
      <aside class="panel" aria-label="Game info">
        <dl class="scoreboard">
          <div class="score"><dt>Score</dt><dd id="score">0</dd></div>
          <div class="score"><dt>Best</dt><dd id="best">0</dd></div>
        </dl>
      </aside>
    </main>

    <!-- On-screen D-pad: touch devices only (in addition to swipe). -->
    <section class="touch-only" id="touchPad" aria-label="Direction pad"></section>

    <footer class="hintbar" id="hintbar">
      <span class="hint"><kbd class="key">←→</kbd> Turn</span>
      <span class="hint"><kbd class="key">↑↓</kbd> Turn</span>
      <span class="hint"><kbd class="key">Enter</kbd> Start · Resume</span>
      <span class="hint"><kbd class="key">Back</kbd> Pause · Menu</span>
      <span class="hint"><kbd class="key">M</kbd> Mute</span>
    </footer>
  </div>

  <script type="module" src="./app.js?v=297692ec-9d04-48fc-b8ba-8d23c1efb13f"></script>
</body>
</html>
