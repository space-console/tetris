<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- TV browsers default to a desktop-width viewport; pin to device width and lock zoom for the 10-foot UI. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05060f" />
  <title>Ludo — Space Console</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- safe-area wrapper protects against TV overscan; see --safe-* in base.css TEST -->
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <a href="../" aria-label="Back to games">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">Ludo</span>
        </a>
      </div>
      <div class="topbar__hint" id="status" aria-live="polite">Tap Roll to start</div>
      <button class="mute" id="mute" type="button" aria-pressed="false" aria-label="Toggle sound" title="Toggle sound (M)">🔊</button>
    </header>

    <main class="stage">
      <!-- Board -->
      <section class="board" aria-label="Ludo board">
        <!-- 15×15 cell grid; populated by app.js -->
        <div class="ludogrid" id="grid" role="grid" aria-label="Ludo board"></div>

        <!-- Start / game-over overlay -->
        <div class="overlay" id="overlay">
          <div class="overlay__card">
            <h1 class="overlay__title" id="overlayTitle">Ludo</h1>
            <p class="overlay__msg" id="overlayMsg">You play Red vs 3 AI</p>
          </div>
        </div>
      </section>

      <!-- Side panel: die, roll button, turn info -->
      <aside class="panel" aria-label="Game info">
        <div class="diebox">
          <!-- 3D tumbling die: the cube's six pip faces are built in app.js; a
               roll spins it and lands the rolled face toward the viewer. -->
          <div class="die-scene die-scene--red" id="dieScene">
            <div class="die-cube" id="dieCube" role="img" aria-label="Die"></div>
          </div>
          <button class="rollbtn" id="rollBtn" type="button" data-touch-ignore>Roll</button>
        </div>
        <dl class="scoreboard">
          <div class="score"><dt>Turn</dt><dd id="turnLabel">Red</dd></div>
          <div class="score"><dt>Home</dt><dd id="homeLabel">0/4</dd></div>
        </dl>
      </aside>
    </main>

    <footer class="hintbar" id="hintbar">
      <span class="hint"><kbd class="key">Enter</kbd> Roll</span>
      <span class="hint"><kbd class="key">←→</kbd> Pick token</span>
      <span class="hint"><kbd class="key">Enter</kbd> Move</span>
      <span class="hint"><kbd class="key">Back</kbd> Hub</span>
      <span class="hint"><kbd class="key">M</kbd> Mute</span>
    </footer>
  </div>

  <script type="module" src="./app.js?v=1078d89c-2c83-4829-a80d-77b9c705e607"></script>
</body>
</html>
