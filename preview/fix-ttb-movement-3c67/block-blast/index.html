<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- TV browsers default to a desktop-width viewport; pin to device width and lock zoom for the 10-foot UI. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05060f" />
  <title>Block Blast — Space Console</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- safe-area wrapper protects against TV overscan; see --safe-* in base.css -->
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <a href="../" aria-label="Back to games">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">Block Blast</span>
        </a>
      </div>
      <div class="topbar__hint" id="status" aria-live="polite">Tap a piece, then a cell to place it</div>
      <button class="mute" id="mute" type="button" aria-pressed="false" aria-label="Toggle sound" title="Toggle sound (M)">🔊</button>
    </header>

    <main class="stage">
      <!-- Board: an 8x8 DOM grid of cells with a roaming cursor + placement
           preview, populated in app.js. -->
      <section class="board" aria-label="Board">
        <div class="grid" id="grid" role="grid" aria-label="Block grid"></div>
        <!-- Overlay for game-over messaging -->
        <div class="overlay overlay--hidden" id="overlay">
          <div class="overlay__card">
            <h1 class="overlay__title" id="overlayTitle">Game Over</h1>
            <p class="overlay__msg" id="overlayMsg">Tap New game to play again</p>
          </div>
        </div>
      </section>

      <!-- Side panel: scoreboard + the 3-piece tray + New game -->
      <aside class="panel" aria-label="Game info">
        <dl class="scoreboard">
          <div class="score"><dt>Score</dt><dd id="score">0</dd></div>
          <div class="score"><dt>Best</dt><dd id="best">0</dd></div>
        </dl>

        <div class="panel__block">
          <h2 class="panel__label">Tray</h2>
          <div class="tray" id="tray" role="group" aria-label="Pieces"></div>
        </div>

        <button class="tbtn ctrl" id="newGame" type="button" data-touch-ignore>New game</button>
      </aside>
    </main>

    <footer class="hintbar" id="hintbar">
      <span class="hint"><kbd class="key">1·2·3</kbd> Pick piece</span>
      <span class="hint"><kbd class="key">Tab</kbd> Next piece</span>
      <span class="hint"><kbd class="key">←↑↓→</kbd> Move</span>
      <span class="hint"><kbd class="key">Enter</kbd> Place</span>
      <span class="hint"><kbd class="key">N</kbd> New game</span>
      <span class="hint"><kbd class="key">Back</kbd> Menu</span>
      <span class="hint"><kbd class="key">M</kbd> Mute</span>
    </footer>
  </div>

  <script type="module" src="./app.js?v=1078d89c-2c83-4829-a80d-77b9c705e607"></script>
</body>
</html>
