<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- TV browsers default to a desktop-width viewport; pin to device width and lock zoom for the 10-foot UI. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05060f" />
  <title>Pinball — Space Console</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- safe-area wrapper protects against TV overscan; see --safe-* in base.css -->
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <a href="../" aria-label="Back to games">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">Pinball</span>
        </a>
      </div>
      <div class="topbar__hint" id="status" aria-live="polite">Press Enter to launch</div>
      <button class="mute" id="mute" type="button" aria-pressed="false" aria-label="Toggle sound" title="Toggle sound (M)">🔊</button>
    </header>

    <main class="stage">
      <!-- Playfield -->
      <section class="board" aria-label="Pinball table">
        <canvas id="board" width="400" height="640"></canvas>
        <!-- Overlay for start / game-over messaging -->
        <div class="overlay" id="overlay">
          <div class="overlay__card">
            <h1 class="overlay__title" id="overlayTitle">Space Pinball</h1>
            <p class="overlay__msg" id="overlayMsg">Tap or press <kbd>Enter</kbd> to launch</p>
          </div>
        </div>
      </section>

      <!-- Side panel: scoreboard -->
      <aside class="panel" aria-label="Game info">
        <dl class="scoreboard">
          <div class="score"><dt>Score</dt><dd id="score">0</dd></div>
          <div class="score"><dt>Balls</dt><dd id="balls">3</dd></div>
        </dl>
      </aside>
    </main>

    <!-- On-screen flipper / launch controls (touch devices only; built in app.js).
         Flippers need press-and-release semantics, so app.js wires pointer
         listeners directly rather than going through the discrete intent layer. -->
    <section class="touch-only touch-controls" id="touchControls" aria-label="Touch controls"></section>

    <footer class="hintbar" id="hintbar">
      <span class="hint"><kbd class="key">←</kbd> / <kbd class="key">Z</kbd> Left flipper</span>
      <span class="hint"><kbd class="key">→</kbd> / <kbd class="key">/</kbd> Right flipper</span>
      <span class="hint"><kbd class="key">Enter</kbd> Launch</span>
      <span class="hint"><kbd class="key">Back</kbd> Menu</span>
      <span class="hint"><kbd class="key">M</kbd> Mute</span>
    </footer>
  </div>

  <script type="module" src="./app.js?v=9b78118d-6bf2-40cf-88d0-2e8e03fde82b"></script>
</body>
</html>
