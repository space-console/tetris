<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- TV browsers default to a desktop-width viewport; pin to device width and lock zoom for the 10-foot UI. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05060f" />
  <title>Tic-Tac-Toe — Space Console</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- safe-area wrapper protects against TV overscan; see --safe-* in base.css -->
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <a href="../" aria-label="Back to games">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">Tic-Tac-Toe</span>
        </a>
      </div>
      <div class="topbar__hint" id="status" aria-live="polite">Press Enter to start</div>
      <button class="mute" id="mute" type="button" aria-pressed="false" aria-label="Toggle sound" title="Toggle sound (M)">🔊</button>
    </header>

    <main class="stage">
      <!-- Board -->
      <section class="board" aria-label="Board">
        <!-- 3×3 grid of big cells; populated by app.js -->
        <div class="grid" id="grid" role="grid" aria-label="Tic-tac-toe grid"></div>
        <!-- Overlay for start / win / draw messaging -->
        <div class="overlay" id="overlay">
          <div class="overlay__card">
            <h1 class="overlay__title" id="overlayTitle">Tic-Tac-Toe</h1>
            <p class="overlay__msg" id="overlayMsg">Press <kbd>Enter</kbd> to start</p>
          </div>
        </div>
      </section>

      <!-- Side panel: round scoreboard -->
      <aside class="panel" aria-label="Game info">
        <dl class="scoreboard">
          <div class="score"><dt>X wins</dt><dd id="winsX">0</dd></div>
          <div class="score"><dt>O wins</dt><dd id="winsO">0</dd></div>
          <div class="score"><dt>Draws</dt><dd id="draws">0</dd></div>
        </dl>
      </aside>
    </main>

    <footer class="hintbar" id="hintbar">
      <span class="hint"><kbd class="key">←→↑↓</kbd> Move cursor</span>
      <span class="hint"><kbd class="key">Enter</kbd> Place mark</span>
      <span class="hint"><kbd class="key">Back</kbd> Menu</span>
      <span class="hint"><kbd class="key">M</kbd> Mute</span>
    </footer>
  </div>

  <script type="module" src="./app.js?v=adedc2b5-b8d9-4616-b94c-154773cdc721"></script>
</body>
</html>
