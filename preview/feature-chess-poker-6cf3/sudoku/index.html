<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- TV browsers default to a desktop-width viewport; pin to device width and lock zoom for the 10-foot UI. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05060f" />
  <title>Sudoku — Space Console</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- safe-area wrapper protects against TV overscan; see --safe-* in base.css -->
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <a href="../" aria-label="Back to games">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">Sudoku</span>
        </a>
      </div>
      <div class="topbar__hint" id="status" aria-live="polite">Fill every row, column and box with 1–9. Tap a cell, then a number.</div>
      <button class="mute" id="mute" type="button" aria-pressed="false" aria-label="Toggle sound" title="Toggle sound (M)">🔊</button>
    </header>

    <main class="stage">
      <!-- Board: a 9×9 DOM grid of cells, built by app.js -->
      <section class="board board--grid" aria-label="Sudoku grid">
        <div class="sudoku" id="grid" role="grid" aria-label="Sudoku board"></div>
        <!-- Overlay for the win message -->
        <div class="overlay overlay--hidden" id="overlay">
          <div class="overlay__card">
            <h1 class="overlay__title" id="overlayTitle">Solved!</h1>
            <p class="overlay__msg" id="overlayMsg">Press <kbd>Enter</kbd> for a new puzzle</p>
          </div>
        </div>
      </section>

      <!-- On-screen number pad (touch only): tap a cell, then tap a digit. -->
      <div class="touch-only touch-controls" id="pad" aria-label="Number pad"></div>
    </main>

    <footer class="hintbar" id="hintbar">
      <span class="hint"><kbd class="key">←↑↓→</kbd> Move</span>
      <span class="hint"><kbd class="key">1–9</kbd> Set</span>
      <span class="hint"><kbd class="key">0</kbd> Clear</span>
      <span class="hint"><kbd class="key">Enter</kbd> Cycle value</span>
      <span class="hint"><kbd class="key">Back</kbd> Menu</span>
      <span class="hint"><kbd class="key">M</kbd> Mute</span>
    </footer>
  </div>

  <script type="module" src="./app.js?v=ed8bc3b3-299e-4c66-883b-27be90463248"></script>
</body>
</html>
