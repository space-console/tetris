<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Tetris — Space Console">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#b14bff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#05060f"/>
  <!-- An S-tetromino, built from four cells. -->
  <g fill="url(#g)" stroke="#05060f" stroke-width="10">
    <rect x="176" y="208" width="80" height="80" rx="12"/>
    <rect x="256" y="208" width="80" height="80" rx="12"/>
    <rect x="256" y="128" width="80" height="80" rx="12"/>
    <rect x="336" y="128" width="80" height="80" rx="12"/>
  </g>
  <rect x="96" y="320" width="320" height="64" rx="16" fill="#6ce0ff" opacity="0.9"/>
</svg>
