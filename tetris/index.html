<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- TV browsers default to a desktop-width viewport; pin to device width and lock zoom for the 10-foot UI. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05060f" />
  <title>Tetris — Space Console</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- safe-area wrapper protects against TV overscan; see --safe-* in base.css -->
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <a href="../" aria-label="Back to games">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">Tetris</span>
        </a>
      </div>
      <div class="topbar__hint" id="status" aria-live="polite">Press Enter to start</div>
      <button class="mute" id="mute" type="button" aria-pressed="false" aria-label="Toggle sound" title="Toggle sound (M)">🔊</button>
    </header>

    <main class="stage">
      <!-- Playfield -->
      <section class="board" aria-label="Playfield">
        <canvas id="board" width="400" height="800"></canvas>
        <!-- Overlay for start / pause / game-over messaging -->
        <div class="overlay" id="overlay">
          <div class="overlay__card">
            <h1 class="overlay__title" id="overlayTitle">Tetris</h1>
            <p class="overlay__msg" id="overlayMsg">Tap or press <kbd>Enter</kbd> to start</p>
          </div>
        </div>
      </section>

      <!-- Side panel: next piece + scoreboard -->
      <aside class="panel" aria-label="Game info">
        <div class="panel__block">
          <h2 class="panel__label">Next</h2>
          <canvas id="next" width="180" height="180"></canvas>
        </div>
        <dl class="scoreboard">
          <div class="score"><dt>Score</dt><dd id="score">0</dd></div>
          <div class="score"><dt>Lines</dt><dd id="lines">0</dd></div>
          <div class="score"><dt>Level</dt><dd id="level">1</dd></div>
        </dl>
      </aside>
    </main>

    <!-- On-screen control pad (touch devices only; populated in app.js) -->
    <section class="touch-only touch-controls" id="touchControls" aria-label="Touch controls"></section>

    <footer class="hintbar" id="hintbar">
      <span class="hint"><kbd class="key">←→</kbd> Move</span>
      <span class="hint"><kbd class="key">↑</kbd> Rotate</span>
      <span class="hint"><kbd class="key">↓</kbd> Soft drop</span>
      <span class="hint"><kbd class="key">Enter</kbd> Hard drop</span>
      <span class="hint"><kbd class="key">Back</kbd> Pause · Menu</span>
      <span class="hint"><kbd class="key">M</kbd> Mute</span>
    </footer>
  </div>

  <script type="module" src="./app.js?v=f688c55d-20b3-40af-91a7-aeda20490a06"></script>
</body>
</html>
