<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- TV browsers default to a desktop-width viewport; pin to device width and lock zoom for the 10-foot UI. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05060f" />
  <title>Slots — Space Console</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- safe-area wrapper protects against TV overscan; see --safe-* in base.css -->
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <a href="../" aria-label="Back to games">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">Slots</span>
        </a>
      </div>
      <div class="topbar__hint" id="status" aria-live="polite">Press Enter to spin</div>
      <button class="mute" id="mute" type="button" aria-pressed="false" aria-label="Toggle sound" title="Toggle sound (M)">🔊</button>
    </header>

    <main class="stage">
      <!-- The cabinet stacks: paytable, the three reels, scoreboard, controls. -->
      <section class="machine" aria-label="Slot machine">
        <!-- Paytable: three-of-a-kind per symbol + the partial wins. -->
        <table class="paytable" aria-label="Paytable">
          <thead>
            <tr><th scope="col">Pays</th><th scope="col">Combination</th><th scope="col">×&nbsp;Bet</th></tr>
          </thead>
          <tbody id="paytableBody"></tbody>
        </table>

        <!-- The three reels (a single centre payline). -->
        <div class="reels" id="reels" aria-label="Reels">
          <div class="reel" data-reel="0"><span class="reel__symbol" id="reel0">🍒</span></div>
          <div class="reel" data-reel="1"><span class="reel__symbol" id="reel1">🍋</span></div>
          <div class="reel" data-reel="2"><span class="reel__symbol" id="reel2">🍊</span></div>
          <!-- The centre payline marker. -->
          <span class="payline" aria-hidden="true"></span>
        </div>

        <!-- Scoreboard strip: credits / bet / last win. -->
        <dl class="scoreboard slots-scoreboard">
          <div class="score"><dt>Credits</dt><dd id="credits">100</dd></div>
          <div class="score"><dt>Bet</dt><dd id="bet">1</dd></div>
          <div class="score slots-score--win"><dt>Win</dt><dd id="win">0</dd></div>
        </dl>

        <!-- Always-visible primary controls (populated in app.js). -->
        <div class="controls" id="controls"></div>

        <!-- Overlay for start / game-over messaging. -->
        <div class="overlay overlay--hidden" id="overlay">
          <div class="overlay__card">
            <h1 class="overlay__title" id="overlayTitle">Slots</h1>
            <p class="overlay__msg" id="overlayMsg">Tap or press <kbd>Enter</kbd> to spin</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="hintbar" id="hintbar">
      <span class="hint"><kbd class="key">Enter</kbd> Spin</span>
      <span class="hint"><kbd class="key">B</kbd> Bet One</span>
      <span class="hint"><kbd class="key">N</kbd> Bet Max</span>
      <span class="hint"><kbd class="key">Back</kbd> Menu</span>
      <span class="hint"><kbd class="key">M</kbd> Mute</span>
    </footer>
  </div>

  <script type="module" src="./app.js?v=89af149e-664e-4d47-bddc-3d6f35f98b83"></script>
</body>
</html>
