<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- TV browsers default to a desktop-width viewport; pin to device width and lock zoom for the 10-foot UI. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05060f" />
  <title>Texas Hold'em — Space Console</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- safe-area wrapper protects against TV overscan; see --safe-* in base.css -->
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <a href="../" aria-label="Back to games">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">Texas Hold'em</span>
        </a>
      </div>
      <div class="topbar__hint" id="status" aria-live="polite">Press Enter to start</div>
      <button class="mute" id="mute" type="button" aria-pressed="false" aria-label="Toggle sound" title="Toggle sound (M)">🔊</button>
    </header>

    <main class="stage">
      <!-- Poker table: opponents top, community + pot centre, you at the bottom. -->
      <section class="table" aria-label="Poker table">
        <div class="seats-top" id="seatsTop" aria-label="Opponents"></div>

        <div class="middle">
          <div class="pot" id="pot" aria-live="polite">Pot 0</div>
          <div class="community" id="community" aria-label="Community cards"></div>
        </div>

        <div class="seat-you" id="seatYou" aria-label="Your seat"></div>

        <!-- Overlay for start / showdown / game-over messaging -->
        <div class="overlay" id="overlay">
          <div class="overlay__card">
            <h1 class="overlay__title" id="overlayTitle">Texas Hold'em</h1>
            <p class="overlay__msg" id="overlayMsg">Tap or press <kbd>Enter</kbd> to start</p>
          </div>
        </div>
      </section>
    </main>

    <!-- Always-visible action bar: these are the primary controls (not touch-only). -->
    <section class="actions" id="actions" aria-label="Your actions"></section>

    <footer class="hintbar" id="hintbar">
      <span class="hint"><kbd class="key">←→</kbd> Pick action</span>
      <span class="hint"><kbd class="key">↑↓</kbd> Raise size</span>
      <span class="hint"><kbd class="key">Enter</kbd> Confirm</span>
      <span class="hint"><kbd class="key">Back</kbd> Menu</span>
      <span class="hint"><kbd class="key">M</kbd> Mute</span>
    </footer>
  </div>

  <script type="module" src="./app.js?v=89af149e-664e-4d47-bddc-3d6f35f98b83"></script>
</body>
</html>
