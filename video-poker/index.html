<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- TV browsers default to a desktop-width viewport; pin to device width and lock zoom for the 10-foot UI. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05060f" />
  <title>Video Poker — Space Console</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- safe-area wrapper protects against TV overscan; see --safe-* in base.css -->
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <a href="../" aria-label="Back to games">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">Video Poker</span>
        </a>
      </div>
      <div class="topbar__hint" id="status" aria-live="polite">Jacks or Better</div>
      <button class="mute" id="mute" type="button" aria-pressed="false" aria-label="Toggle sound" title="Toggle sound (M)">🔊</button>
    </header>

    <main class="stage">
      <section class="table" aria-label="Video poker table">
        <!-- Paytable: rows are filled in by app.js; the hit row highlights. -->
        <table class="paytable" id="paytable" aria-label="Pay table">
          <tbody id="paytableBody"></tbody>
        </table>

        <!-- The five-card hand; cards are built once by app.js. -->
        <div class="hand" id="hand" role="group" aria-label="Your hand"></div>

        <!-- Scoreboard: credits / bet / last win / hand. -->
        <dl class="scoreboard vp-scoreboard">
          <div class="score"><dt>Credits</dt><dd id="credits">100</dd></div>
          <div class="score"><dt>Bet</dt><dd id="bet">1</dd></div>
          <div class="score"><dt>Win</dt><dd id="win">0</dd></div>
          <div class="score vp-score--hand"><dt>Hand</dt><dd id="handName">—</dd></div>
        </dl>

        <!-- Always-visible primary controls (mouse, touch, and remote). -->
        <section class="controls" id="controls" aria-label="Controls"></section>

        <!-- Overlay for start / game-over messaging. -->
        <div class="overlay" id="overlay">
          <div class="overlay__card">
            <h1 class="overlay__title" id="overlayTitle">Video Poker</h1>
            <p class="overlay__msg" id="overlayMsg">Press <kbd>Enter</kbd> to deal</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="hintbar" id="hintbar">
      <span class="hint"><kbd class="key">←→</kbd> Pick card</span>
      <span class="hint"><kbd class="key">↑</kbd> Hold</span>
      <span class="hint"><kbd class="key">Enter</kbd> Deal · Draw</span>
      <span class="hint"><kbd class="key">B</kbd> Bet One</span>
      <span class="hint"><kbd class="key">N</kbd> Bet Max</span>
      <span class="hint"><kbd class="key">Back</kbd> Menu</span>
      <span class="hint"><kbd class="key">M</kbd> Mute</span>
    </footer>
  </div>

  <script type="module" src="./app.js?v=a7ad4417-db97-401f-8640-bbe7a585894c"></script>
</body>
</html>
